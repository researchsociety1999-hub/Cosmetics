name: Playwright E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch on new pushes
concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: E2E Tests (Chromium)
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node ────────────────────────────────────────────────────────────────
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          # Cache root lockfile (Playwright) AND next-app lockfile (Next build)
          cache-dependency-path: |
            package-lock.json
            next-app/package-lock.json

      # ── Dependencies ────────────────────────────────────────────────────────
      - name: Install root dependencies (Playwright)
        run: npm ci

      - name: Install next-app dependencies
        run: npm ci --prefix next-app

      # ── Playwright browsers ─────────────────────────────────────────────────
      - name: Install Playwright browsers + OS deps
        run: npx playwright install chromium --with-deps

      # ── Tests ───────────────────────────────────────────────────────────────
      - name: Run Playwright tests
        run: npx playwright test --reporter=list,html
        env:
          CI: 'true'
          # Mock catalog — no Supabase/Stripe secrets needed
          ALLOW_MOCK_CATALOG: '1'
          E2E_MOCK_CATALOG: '1'
          # next start runs as production over http://localhost
          E2E_ALLOW_HTTP_COOKIES: '1'
          # Allow /api/health/integrations in production mode
          ENABLE_INTEGRATION_HEALTH: '1'
          # Server port expected by playwright.config.ts
          PORT: '3001'

      # ── Artifacts ───────────────────────────────────────────────────────────
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        # Always upload so failed run reports are accessible
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload failure artifacts (screenshots + videos)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-failures
          path: |
            test-results/
          retention-days: 7
